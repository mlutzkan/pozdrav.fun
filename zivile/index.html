<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday! 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff8f5;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ── Diagonal background ── */
  .hb-bg {
    position: fixed;
    inset: -100%;
    width: 300%;
    height: 300%;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    transform: rotate(-22deg);
    pointer-events: none;
    z-index: 0;
    user-select: none;
  }
  .hb-bg span {
    font-family: 'Cormorant Garant', serif;
    font-size: 1.25rem;
    font-weight: 500;
    color: rgba(220, 80, 100, 0.09);
    white-space: nowrap;
    padding: 14px 22px;
    letter-spacing: 0.05em;
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 1;
    background: #fff;
    border-radius: 24px;
    padding: 3rem 2.5rem 2.5rem;
    width: min(480px, calc(100vw - 2rem));
    box-shadow:
      0 4px 6px rgba(0,0,0,0.04),
      0 12px 40px rgba(0,0,0,0.08),
      0 0 0 1px rgba(220,80,100,0.07);
    text-align: center;
  }

  .card-emoji {
    font-size: 3.5rem;
    display: block;
    margin-bottom: 1.25rem;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  .card-title {
    font-family: 'Cormorant Garant', serif;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 400;
    color: #1a1a2e;
    line-height: 1.15;
    margin-bottom: 0.5rem;
  }
  .card-subtitle {
    font-size: 0.88rem;
    color: rgba(100, 60, 70, 0.55);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  /* ── Player ── */
  .player {
    background: #fff8f5;
    border: 1.5px solid rgba(220, 80, 100, 0.12);
    border-radius: 14px;
    padding: 1.4rem 1.5rem;
  }

  .player-controls {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .play-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #dc5064;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, background 0.2s;
    box-shadow: 0 4px 14px rgba(220,80,100,0.35);
  }
  .play-btn:hover { background: #c44258; transform: scale(1.07); }
  .play-btn:active { transform: scale(0.96); }
  .play-btn svg { width: 20px; height: 20px; fill: #fff; }

  .player-info { flex: 1; text-align: left; }
  .player-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 0.15rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-time {
    font-size: 0.75rem;
    color: rgba(100,60,70,0.5);
    font-variant-numeric: tabular-nums;
  }

  /* Progress bar */
  .progress-track {
    height: 4px;
    background: rgba(220,80,100,0.12);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, #dc5064, #f0889a);
    border-radius: 4px;
    width: 0%;
    transition: width 0.15s linear;
  }

  /* Waveform bars */
  .waveform {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 36px;
    margin-bottom: 0.85rem;
  }
  .wv-bar {
    flex: 1;
    border-radius: 2px;
    background: rgba(220,80,100,0.18);
    animation: wave-pulse 1.4s ease-in-out infinite;
    animation-play-state: paused;
    transition: background 0.2s;
  }
  .wv-bar.playing {
    background: linear-gradient(to top, rgba(220,80,100,0.4), rgba(220,80,100,0.9));
    animation-play-state: running;
  }
  @keyframes wave-pulse {
    0%, 100% { transform: scaleY(1); }
    50%       { transform: scaleY(0.35); }
  }

  /* Powered by */
  .footer-note {
    margin-top: 2rem;
    font-size: 0.72rem;
    color: rgba(100,60,70,0.35);
    letter-spacing: 0.06em;
  }
  .footer-note a { color: inherit; text-decoration: none; }
  .footer-note a:hover { color: #dc5064; }
</style>
</head>
<body>

<div class="hb-bg" id="hb-bg" aria-hidden="true"></div>

<div class="card">
  <span class="card-emoji">🎂</span>
  <h1 class="card-title">Happy Birthday!</h1>

  <div class="player">
    <div class="waveform" id="waveform"></div>

    <div class="player-controls">
      <button class="play-btn" id="play-btn" aria-label="Пусни / Паузирай">
        <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="player-info">
        <div class="player-title">Missed your day</div>
        <div class="player-time">
          <span id="current-time">0:00</span> / <span id="duration">—:——</span>
        </div>
      </div>
    </div>

    <div class="progress-track" id="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <p class="footer-note">С любов от <a href="https://pozdrav.fun">pozdrav.fun</a></p>
</div>

<script>
  // ── Background pattern ──────────────────────────────────
  const bg = document.getElementById('hb-bg');
  const phrase = 'Happy Birthday!  ';
  for (let i = 0; i < 600; i++) {
    const s = document.createElement('span');
    s.textContent = phrase;
    bg.appendChild(s);
  }

  // ── Waveform bars ───────────────────────────────────────
  const wf = document.getElementById('waveform');
  const wfH = [30,55,80,65,90,50,75,40,85,60,45,70,95,55,35,75,60,80,50,45,70,85,55,40,65];
  wfH.forEach((h, i) => {
    const bar = document.createElement('div');
    bar.className = 'wv-bar';
    bar.style.height = h + '%';
    bar.style.animationDelay = (i * 0.06) + 's';
    wf.appendChild(bar);
  });

  // ── Audio player ────────────────────────────────────────
  const audio       = new Audio('song.mp3');
  const playBtn     = document.getElementById('play-btn');
  const playIcon    = document.getElementById('play-icon').querySelector('path');
  const progressTrack = document.getElementById('progress-track');
  const progressFill  = document.getElementById('progress-fill');
  const currentTimeEl = document.getElementById('current-time');
  const durationEl    = document.getElementById('duration');
  const bars          = document.querySelectorAll('.wv-bar');

  let playing = false;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const ss = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${ss}`;
  }

  function setPlaying(state) {
    playing = state;
    playIcon.setAttribute('d', state
      ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'
      : 'M8 5v14l11-7z'
    );
    bars.forEach(b => b.classList.toggle('playing', state));
  }

  audio.addEventListener('loadedmetadata', () => {
    durationEl.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = audio.currentTime / audio.duration * 100;
    progressFill.style.width = pct + '%';
    currentTimeEl.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('ended', () => setPlaying(false));

  playBtn.addEventListener('click', () => {
    if (playing) {
      audio.pause();
      setPlaying(false);
    } else {
      audio.play().catch(() => setPlaying(false));
      setPlaying(true);
    }
  });

  progressTrack.addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = progressTrack.getBoundingClientRect();
    const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    audio.currentTime = pct * audio.duration;
    progressFill.style.width = (pct * 100) + '%';
  });
</script>

</body>
</html>
